<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Direct Camera Feed V8</title>
  <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
  <style>
    :root { color-scheme: dark; --bg:#060814; --panel:#151823; --line:#303545; --text:#f4f6ff; --muted:#aeb3c4; --ok:#50e487; --bad:#ff6b6b; }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 0%,#1d2542,#060814 45%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;min-height:100dvh;padding:18px;overflow:hidden}
    .app{height:calc(100dvh - 36px);display:grid;grid-template-columns:1fr 420px;gap:18px}.stage,.side{border:1px solid var(--line);background:rgba(21,24,35,.76);border-radius:28px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35)}
    .stage{position:relative;display:grid;place-items:center}.clock{position:absolute;left:7vw;top:8vh;font-size:clamp(7rem,20vw,19rem);font-weight:200;line-height:.82;letter-spacing:-.08em;color:#eef0ff;text-shadow:0 12px 60px rgba(170,190,255,.25);z-index:1}.small{position:absolute;left:24px;top:18px;color:var(--muted);z-index:2}.side{padding:18px;display:grid;grid-template-rows:auto auto 1fr auto auto;gap:14px}h1{font:400 1.35rem Georgia,serif;margin:0}p{margin:.25rem 0;color:var(--muted);line-height:1.35}.card{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:24px;padding:14px}.status{display:flex;gap:10px;align-items:center;font-weight:700}.dot{width:13px;height:13px;border-radius:50%;background:#747989;box-shadow:0 0 0 6px rgba(255,255,255,.05)}.dot.ok{background:var(--ok);box-shadow:0 0 0 6px rgba(80,228,135,.12),0 0 24px rgba(80,228,135,.55)}
    .videoBox{background:#000;border-radius:24px;overflow:hidden;border:1px solid var(--line);position:relative;min-height:300px}.videoBox video{width:100%;height:100%;display:block;object-fit:contain;background:#000}.placeholder{position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:var(--muted);padding:24px}.hide{display:none!important}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:999px;padding:12px 16px;background:#303546;color:var(--text);font-weight:800}.btn.primary{background:#eef0ff;color:#0a0d18}.btn.danger{background:#5d1822;color:#ffd5d9}.btn:active{transform:scale(.98)}select{width:100%;margin-top:8px;border-radius:14px;background:#0e111b;color:var(--text);border:1px solid var(--line);padding:10px}.log{height:120px;overflow:auto;white-space:pre-wrap;font:12px ui-monospace,SFMono-Regular,Menlo,monospace;color:#cbd1e8;background:#070914;border:1px solid var(--line);border-radius:16px;padding:10px}.stat{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;color:#cbd1e8}
    @media(max-width:900px){body{padding:0}.app{height:100dvh;display:block}.stage{display:none}.side{height:100dvh;border-radius:0;border:0}.videoBox{min-height:50dvh}}
  </style>
</head>
<body>
<main class="app">
  <section class="stage"><div class="small" id="roomLabel">Direct room: td-clockcam-direct-room · V8 Discord-style raw WebRTC</div><div class="clock" id="clock">12<br>00</div></section>
  <aside class="side">
    <div><h1>Direct Live View</h1><p id="sub">Raw camera WebRTC with Ably signaling. No PeerJS, Blob, Redis or JPEG engine.</p></div>
    <div class="card"><div class="status"><span id="dot" class="dot"></span><span id="statusTitle">Starting…</span></div><p id="statusText">Loading.</p></div>
    <div class="videoBox" id="videoBox"><video id="remoteVideo" autoplay playsinline muted></video><video id="localVideo" autoplay playsinline muted class="hide"></video><div id="placeholder" class="placeholder"><div><b>No live feed yet</b><br>Start camera on one device. Press Watch on the other.</div></div></div>
    <div class="card">
      <label>Codec preference<select id="codecSelect"><option value="h264">H.264 first — Discord-style/default</option><option value="vp8">VP8 first</option><option value="default">Browser default</option></select></label>
      <p class="stat" id="stats">Stats: idle</p>
    </div>
    <div class="actions"><button class="btn primary" id="startBtn">Start camera</button><button class="btn" id="watchBtn">Watch</button><button class="btn" id="fullBtn">Fullscreen</button><button class="btn danger" id="stopBtn">Stop</button></div>
    <div class="log" id="log"></div>
  </aside>
</main>
<script>
(() => {
  'use strict';
  const ROOM = 'td-clockcam-direct-room';
  const CHANNEL = 'clockcam:' + ROOM;
  const $ = id => document.getElementById(id);
  const localVideo=$('localVideo'), remoteVideo=$('remoteVideo'), placeholder=$('placeholder'), dot=$('dot'), statusTitle=$('statusTitle'), statusText=$('statusText'), logEl=$('log'), codecSelect=$('codecSelect'), statsEl=$('stats');
  const clientId = 'v8-' + Math.random().toString(36).slice(2,8) + '-' + Date.now().toString(36);
  let ably, channel, localStream, pc, role='idle', cameraClientId=null, statsTimer=null;
  const iceServers = [{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}];
  function log(s){ const t=new Date().toLocaleTimeString(); console.log('[v8]',s); logEl.textContent += `[${t}] ${s}\n`; logEl.scrollTop=logEl.scrollHeight; }
  function setStatus(title,text,live=false){ statusTitle.textContent=title; statusText.textContent=text; dot.classList.toggle('ok',!!live); }
  function send(type, data={}, to='all'){ channel.publish('signal',{ type, from:clientId, to, room:ROOM, ...data }); }
  function updateClock(){ const n=new Date(); $('clock').innerHTML=String(n.getHours()).padStart(2,'0')+'<br>'+String(n.getMinutes()).padStart(2,'0'); }
  setInterval(updateClock,1000); updateClock();

  async function connectAbly(){
    setStatus('Connecting…','Connecting to Ably signaling.');
    ably = new Ably.Realtime({ authUrl:'/api/ably-token?clientId='+encodeURIComponent(clientId), clientId, echoMessages:false, transports:['web_socket','xhr_streaming','xhr_polling'] });
    channel = ably.channels.get(CHANNEL);
    await new Promise((resolve,reject)=>{ const to=setTimeout(()=>reject(new Error('Ably connect timeout')),45000); ably.connection.once('connected',()=>{clearTimeout(to);resolve();}); ably.connection.once('failed',e=>{clearTimeout(to);reject(e.reason||new Error('Ably failed'));}); });
    await channel.subscribe('signal', onSignal);
    await channel.presence.enter({role:'idle', v:'8', clientId});
    setStatus('Ready','Connected to realtime signaling.');
    log('Ably connected as '+clientId);
  }

  function preferCodecs(transceiver){
    const pref = codecSelect.value;
    if (pref === 'default' || !RTCRtpSender.getCapabilities || !transceiver.setCodecPreferences) return;
    const caps = RTCRtpSender.getCapabilities('video');
    if (!caps?.codecs?.length) return;
    const wanted = pref === 'h264' ? 'H264' : 'VP8';
    const primary = caps.codecs.filter(c => c.mimeType.toUpperCase().includes(wanted));
    const rest = caps.codecs.filter(c => !c.mimeType.toUpperCase().includes(wanted));
    if (primary.length) { transceiver.setCodecPreferences([...primary, ...rest]); log('Codec preference set: '+wanted); }
  }

  function newPc(){
    if (pc) try{pc.close()}catch{}
    pc = new RTCPeerConnection({iceServers});
    pc.onicecandidate = e => { if(e.candidate) send('candidate',{candidate:e.candidate}, cameraClientId || 'all'); };
    pc.onconnectionstatechange = () => { log('pc connectionState: '+pc.connectionState); if(pc.connectionState==='connected') setStatus(role==='camera'?'Camera online':'Watching live', role==='camera'?'Viewer connected.':'Direct camera connected.', true); };
    pc.oniceconnectionstatechange = () => log('iceConnectionState: '+pc.iceConnectionState);
    pc.onsignalingstatechange = () => log('signalingState: '+pc.signalingState);
    return pc;
  }

  async function startCamera(){
    try{
      role='camera';
      setStatus('Opening camera…','Requesting camera permission.');
      localStream = await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}}, audio:false});
      localVideo.srcObject=localStream; localVideo.classList.remove('hide'); remoteVideo.classList.add('hide'); placeholder.classList.add('hide');
      await channel.presence.update({role:'camera', v:'8', clientId});
      send('camera-online',{codec:codecSelect.value});
      setStatus('Camera online','Camera preview works. Waiting for viewer offer.',true);
      log('Camera started. Track settings: '+JSON.stringify(localStream.getVideoTracks()[0].getSettings?.()||{}));
    }catch(e){ alert('Could not start camera: '+(e.message||e)); setStatus('Camera failed', e.message||String(e)); log('Camera error '+(e.message||e)); }
  }

  async function watch(){
    try{
      role='viewer'; cameraClientId=null;
      remoteVideo.classList.remove('hide'); localVideo.classList.add('hide'); placeholder.classList.remove('hide');
      setStatus('Finding camera…','Looking for a camera device in Ably presence.');
      const members = await channel.presence.get();
      const cam = members.find(m => m.data?.role === 'camera' && m.clientId !== clientId);
      if (!cam) { send('viewer-looking'); setStatus('No camera found','Start camera on the car screen, then press Watch again.'); log('No camera presence found. Sent viewer-looking.'); return; }
      cameraClientId = cam.clientId;
      log('Found camera: '+cameraClientId);
      const p = newPc();
      p.ontrack = ev => {
        log('ontrack: streams='+ev.streams.length+' track='+ev.track.kind+' state='+ev.track.readyState);
        const stream = ev.streams[0] || new MediaStream([ev.track]);
        remoteVideo.srcObject = stream;
        remoteVideo.muted = true;
        remoteVideo.playsInline = true;
        remoteVideo.classList.remove('hide'); placeholder.classList.add('hide');
        remoteVideo.play().then(()=>log('remoteVideo.play OK')).catch(err=>log('remoteVideo.play failed: '+(err.message||err)));
        startStats();
      };
      const transceiver = p.addTransceiver('video',{direction:'recvonly'}); preferCodecs(transceiver);
      p.onicecandidate = e => { if(e.candidate) send('candidate',{candidate:e.candidate}, cameraClientId); };
      const offer = await p.createOffer({offerToReceiveVideo:true});
      await p.setLocalDescription(offer);
      send('offer',{sdp:p.localDescription}, cameraClientId);
      setStatus('Connecting…','Offer sent. Waiting for camera answer.');
    }catch(e){ alert('Watch failed: '+(e.message||e)); log('Watch error '+(e.message||e)); setStatus('Watch failed',e.message||String(e)); }
  }

  async function onSignal(msg){
    const d=msg.data||{}; if(d.room!==ROOM || d.from===clientId) return; if(d.to && d.to!=='all' && d.to!==clientId) return;
    try{
      if(d.type==='camera-online'){ cameraClientId=d.from; log('Camera online from '+d.from); if(role!=='camera') setStatus('Camera online','Press Watch to connect.',true); }
      if(d.type==='viewer-looking' && role==='camera'){ send('camera-online',{codec:codecSelect.value},d.from); }
      if(d.type==='offer' && role==='camera'){
        log('Offer received from '+d.from); cameraClientId=d.from;
        const p=newPc();
        if(!localStream) throw new Error('Camera not started');
        for(const track of localStream.getVideoTracks()) { const tr=p.addTransceiver(track,{direction:'sendonly', streams:[localStream]}); preferCodecs(tr); }
        p.onicecandidate=e=>{ if(e.candidate) send('candidate',{candidate:e.candidate},d.from); };
        await p.setRemoteDescription(d.sdp);
        const answer=await p.createAnswer();
        await p.setLocalDescription(answer);
        send('answer',{sdp:p.localDescription},d.from);
        setStatus('Camera online','Answer sent. Connecting viewer…',true);
      }
      if(d.type==='answer' && role==='viewer' && pc){ log('Answer received'); await pc.setRemoteDescription(d.sdp); }
      if(d.type==='candidate' && pc && d.candidate){ await pc.addIceCandidate(d.candidate).catch(e=>log('addIceCandidate warning: '+(e.message||e))); }
    }catch(e){ log('Signal handler error: '+(e.message||e)); setStatus('Signal error',e.message||String(e)); }
  }

  function startStats(){
    clearInterval(statsTimer);
    let lastFrames=0;
    statsTimer=setInterval(async()=>{
      if(!pc) return;
      const stats=await pc.getStats();
      let text='Stats: ';
      stats.forEach(r=>{ if(r.type==='inbound-rtp' && r.kind==='video'){ text += `framesDecoded=${r.framesDecoded||0} fps=${r.framesPerSecond||0} bytes=${r.bytesReceived||0} packetsLost=${r.packetsLost||0}`; if((r.framesDecoded||0)>lastFrames) placeholder.classList.add('hide'); lastFrames=r.framesDecoded||0; } });
      statsEl.textContent=text;
    },1000);
  }

  function stop(){
    try{pc?.close()}catch{} pc=null; clearInterval(statsTimer);
    if(localStream){localStream.getTracks().forEach(t=>t.stop()); localStream=null;}
    localVideo.srcObject=null; remoteVideo.srcObject=null; localVideo.classList.add('hide'); remoteVideo.classList.remove('hide'); placeholder.classList.remove('hide');
    role='idle'; cameraClientId=null; if(channel) channel.presence.update({role:'idle',v:'8',clientId}).catch(()=>{});
    setStatus('Ready','Stopped.'); statsEl.textContent='Stats: idle';
  }

  $('startBtn').onclick=startCamera; $('watchBtn').onclick=watch; $('stopBtn').onclick=stop; $('fullBtn').onclick=()=>{ const el=$('videoBox'); if(el.requestFullscreen) el.requestFullscreen(); else remoteVideo.webkitEnterFullscreen?.(); };
  connectAbly().catch(e=>{ alert('Could not connect signaling: '+(e.message||e)); setStatus('Signaling failed',e.message||String(e)); log('Ably failed '+(e.message||e)); });
})();
</script>
</body>
</html>
